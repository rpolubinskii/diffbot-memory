# diffbot-memory: a custom Graphiti MCP service (built from ./Dockerfile) plus
# FalkorDB. Runs on the RTX 3090 host. The service uses local Ollama for the
# extraction LLM + embeddings and disables MCP DNS-rebinding in-app, so diffbot-mcp
# connects straight to :8100 (no reverse proxy).
services:
  falkordb:
    image: falkordb/falkordb:latest
    container_name: diffbot-memory-falkordb
    restart: unless-stopped
    ports:
      - "3100:3000"   # FalkorDB browser UI (avoids a busy :3000)
    volumes:
      - falkordb_data:/data

  diffbot-memory:
    build: .
    container_name: diffbot-memory
    restart: unless-stopped
    env_file: .env
    depends_on:
      - falkordb
    ports:
      - "8100:8100"   # MCP /mcp/ that diffbot-mcp connects to
    extra_hosts:
      - "host.docker.internal:host-gateway"   # reach Ollama on the 3090 host

volumes:
  falkordb_data:
