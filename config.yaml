# Graphiti MCP server config for diffbot-memory. ${VARS} resolve from .env.
# Derived from the upstream mcp_server config; only the values diffbot needs are
# overridden. Reconcile entity_types / new keys against the pinned image version.
server:
  transport: "http"
  host: "0.0.0.0"
  port: 8000

# Extraction LLM via Ollama (OpenAI-compatible). gemma-4-31B-it IQ4_XS is large
# enough for Graphiti's structured extraction; smaller models emit malformed JSON.
llm:
  provider: "openai"
  model: ${MODEL_NAME:hf.co/unsloth/gemma-4-31B-it-GGUF:IQ4_XS}
  max_tokens: 4096
  providers:
    openai:
      api_key: ${OPENAI_API_KEY:ollama}
      api_url: ${OPENAI_API_URL:http://host.docker.internal:11434/v1}

# Embeddings via Ollama bge-m3. dimensions MUST match the model (bge-m3 = 1024),
# not the upstream default of 1536, or the FalkorDB vector index will mismatch.
embedder:
  provider: "openai"
  model: ${EMBEDDER_MODEL:bge-m3}
  dimensions: 1024
  providers:
    openai:
      api_key: ${OPENAI_API_KEY:ollama}
      api_url: ${OPENAI_API_URL:http://host.docker.internal:11434/v1}

database:
  provider: "falkordb"
  providers:
    falkordb:
      uri: ${FALKORDB_URI:redis://localhost:6379}
      database: ${FALKORDB_DATABASE:default_db}

graphiti:
  group_id: ${GRAPHITI_GROUP_ID:diffbot}
  user_id: ${USER_ID:diffbot}
